name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Run tests
        run: pytest tests/ -q

  eval-set:
    # The eval set is committed but generated. If cases.jsonl and manifest.json
    # disagree, someone hand-edited one of them or a build was half-committed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install test dependencies
        run: pip install -r requirements-test.txt

      - name: Eval set is internally consistent
        run: |
          python - <<'PY'
          import json, pathlib, sys

          cases = [json.loads(line) for line in
                   pathlib.Path("eval_set/cases.jsonl").read_text().splitlines() if line.strip()]
          manifest = json.loads(pathlib.Path("eval_set/manifest.json").read_text())

          errors = []
          if manifest["case_count"] != len(cases):
              errors.append(f"manifest says {manifest['case_count']} cases, file has {len(cases)}")

          ids = [c["case_id"] for c in cases]
          if len(set(ids)) != len(ids):
              errors.append("duplicate case_id values")

          if errors:
              print("\n".join(errors))
              sys.exit(1)
          print(f"eval set OK: {len(cases)} cases")
          PY

      - name: Replay the eval
        run: python eval_line_calls.py
