name: SquashLineCalling
options:
  bundleIdPrefix: app.crosscourt
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 5Q27N692DM
targets:
  SquashLineCalling:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
      - path: Model
        optional: true
        type: folder
        buildPhase: resources
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: Crosscourt
        UILaunchScreen: {}
        NSCameraUsageDescription: Records rallies and runs the live ball tracker.
        NSMicrophoneUsageDescription: Impact sounds help the analyzer find wall hits.
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UIRequiresFullScreen: true
        ITSAppUsesNonExemptEncryption: false
        # Allows the plain-HTTP serverBase override against a LAN Flask
        # instance (Config.swift). Local networking only; ATS still enforces
        # HTTPS for everything else.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.crosscourt
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  SquashLineCallingTests:
    type: bundle.unit-test
    platform: iOS
    sources: [Tests]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: SquashLineCalling
