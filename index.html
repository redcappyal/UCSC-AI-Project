<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Squash Line Calling</title>
<meta name="theme-color" content="#141416">
<script>
(function(){
  var t = localStorage.getItem('slc-theme');
  if(t !== 'dark' && t !== 'light')
    t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  document.documentElement.dataset.theme = t;
})();
</script>
<style>
  :root{ color-scheme:dark;
    --bg:#141416; --surface:#1e1e21; --line:#28282c; --dim:#a0a0a8; --text:#ececee;
    --btn-border:#3a3a3f; --accent-bg:#ececee; --accent-text:#141416;
    --strip-bg:#0a0a0c;
    --out:#35e0ff;           /* fitted out-line edge */
    --tin:#b4ff3a;           /* fitted tin edge */
    --in:#2ecc5e; --outcall:#e03a2f;   /* IN/OUT verdict colors only */
  }
  :root[data-theme="light"]{ color-scheme:light;
    --bg:#f5f5f7; --surface:#ffffff; --line:#e5e5ea; --dim:#6e6e76; --text:#1d1d20;
    --btn-border:#d9d9df; --accent-bg:#1d1d20; --accent-text:#f7f7f8;
    --strip-bg:#e3e3e8;
    --out:#007da6; --tin:#557a00;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html{height:100%}
  body{height:100dvh; overflow:hidden; display:flex; flex-direction:column;
    background:var(--bg); color:var(--text); font-size:17px; line-height:1.35;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-tap-highlight-color:transparent}
  .hidden{display:none !important}

  #errBanner{position:fixed; top:0; left:0; right:0; z-index:30; display:flex; gap:12px;
    align-items:center; background:var(--bg); border-bottom:3px solid var(--text); padding:12px 14px}
  #errBanner span{flex:1; font-weight:700; font-size:15px}
  #errBanner button{width:auto; min-height:44px; padding:6px 14px; font-size:14px}

  header{flex:0 0 auto; display:flex; align-items:center; gap:12px;
    padding:8px 14px; min-height:56px; border-bottom:1px solid var(--line)}
  #stepLabel{font-size:17px; font-weight:600}
  #themeBtn{margin-left:auto; width:44px; min-width:44px; min-height:44px; padding:0;
    background:none; border:none}
  #themeBtn .sun-and-moon > *{transform-origin:center}
  #themeBtn .sun{transform:scale(1.75); transition:transform .5s cubic-bezier(.25,0,.3,1)}
  #themeBtn .sun-beams{stroke-width:2; opacity:0; transform:rotateZ(-25deg);
    transition:transform .5s cubic-bezier(.5,1.25,.75,1.25), opacity .5s cubic-bezier(.25,0,.3,1)}
  #themeBtn .moonmask > circle{transform:translateX(-7px); transition:transform .35s cubic-bezier(0,0,0,1)}
  :root[data-theme="light"] #themeBtn .sun{transform:none}
  :root[data-theme="light"] #themeBtn .sun-beams{opacity:1; transform:none}
  :root[data-theme="light"] #themeBtn .moonmask > circle{transform:none}
  ::view-transition-old(root), ::view-transition-new(root){animation:none; mix-blend-mode:normal}
  #instr{flex:0 0 auto; padding:8px 14px; font-size:15px; color:var(--dim);
    border-bottom:1px solid var(--line)}
  #instr b.out{color:var(--out)} #instr b.tin{color:var(--tin)}

  #stage{position:relative; flex:1 1 0; min-height:0; display:flex; align-items:center;
    justify-content:center; overflow:hidden; background:var(--strip-bg)}
  #view{max-width:100%; max-height:100%; touch-action:none;
    transform-origin:0 0; will-change:transform}
  #zoomCtrl{position:absolute; top:8px; right:8px; display:flex; gap:8px; z-index:5}
  #zoomCtrl button{width:auto; min-width:48px; min-height:48px; padding:0 12px; font-size:18px;
    color:#fff; background:rgba(0,0,0,.72); border:1px solid #666}

  main{flex:0 0 auto; overflow:hidden;
    padding:12px 14px max(12px, env(safe-area-inset-bottom))}
  body.phase-load main{flex:1; display:flex; flex-direction:column; justify-content:center}
  main section{display:flex; flex-direction:column; gap:10px}

  h2{font-size:21px; text-align:center}
  .instruction{font-size:15px; color:var(--dim); text-align:center}
  .status{font-size:14px; color:var(--dim); min-height:1.2em}
  .status.warn{color:var(--text); font-weight:700}
  .status.ok{color:var(--text)}

  button, label.filebtn{font:inherit; font-size:17px; font-weight:600; color:var(--text);
    background:var(--surface); border:1px solid var(--btn-border); border-radius:10px;
    width:100%; min-height:48px; padding:10px 16px;
    display:flex; align-items:center; justify-content:center; cursor:pointer}
  button:disabled{opacity:.4}
  button.primary, label.filebtn{background:var(--accent-bg); color:var(--accent-text); border-color:var(--accent-bg)}
  button.small{width:auto; min-height:44px; padding:8px 12px; font-size:15px; font-weight:500}
  .row{display:flex; gap:10px}
  .row>*{flex:1}

  input[type=file]{display:none}
  input[type=range]{width:100%; height:44px; accent-color:var(--accent-bg)}
  input[type=number]{width:100%; background:var(--surface); color:var(--text); border:1px solid var(--line);
    border-radius:10px; font:inherit; font-size:17px; padding:10px 12px; min-height:48px}
  .sliderlabel{display:flex; justify-content:space-between; font-size:14px; color:var(--dim)}
  .sliderlabel output{color:var(--text)}

  .stat{display:flex; justify-content:space-between; font-size:14px; color:var(--dim)}
  .progressbox{padding:10px 12px; border-radius:10px; border:1px solid var(--line)}
  .progressbar{height:10px; border-radius:999px; background:var(--line); overflow:hidden; margin-top:8px}
  .progressbar span{display:block; height:100%; width:0%; background:var(--accent-bg); transition:width .18s ease}
  .progressbar.indeterminate span{width:35%; animation:slidebar 1.1s ease-in-out infinite}
  @keyframes slidebar{0%{transform:translateX(-120%)} 100%{transform:translateX(320%)}}

  .clipOverview{position:relative; height:44px; border-radius:8px; overflow:hidden;
    background:var(--strip-bg); border:1px solid var(--line); touch-action:none}
  #overviewStrip{position:absolute; inset:0; width:100%; height:100%; display:block}
  #overviewSelection{position:absolute; top:0; bottom:0; background:rgba(255,255,255,.35); pointer-events:none}
  #overviewViewport{position:absolute; top:0; bottom:0; border:2px solid #999; border-radius:4px;
    box-sizing:border-box; pointer-events:none}
  .clipEditor{position:relative; height:96px; border-radius:8px; overflow:hidden;
    background:var(--strip-bg); border:1px solid var(--line); touch-action:none}
  #filmstrip{position:absolute; inset:0; width:100%; height:100%; display:block}
  .clipShade{position:absolute; top:0; bottom:0; background:rgba(0,0,0,.62); pointer-events:none}
  #shadeLeft{left:0} #shadeRight{right:0}
  #clipSelection{position:absolute; top:0; bottom:0; border:3px solid #fff;
    border-radius:6px; pointer-events:none}
  .clipHandle{position:absolute; top:0; bottom:0; width:32px; background:#fff;
    cursor:ew-resize; display:flex; align-items:center; justify-content:center}
  .clipHandle::after{content:''; width:4px; height:52px; border-left:2px solid rgba(0,0,0,.55);
    border-right:2px solid rgba(0,0,0,.55)}
  #clipStartHandle{border-radius:6px 0 0 6px} #clipEndHandle{border-radius:0 6px 6px 0}
  #clipCursor{position:absolute; top:0; bottom:0; width:3px; background:#f5f5f5;
    box-shadow:0 0 0 1px rgba(0,0,0,.45); pointer-events:none}
  .clipHandle.offview{opacity:.35}
  .nudgeRow{display:flex; gap:8px; align-items:stretch}
  .nudgeLabel{flex:0 0 78px; font-size:13px; color:var(--dim);
    display:flex; flex-direction:column; justify-content:center}
  .nudgeLabel output{color:var(--text); font-size:15px; font-variant-numeric:tabular-nums}
  .frameOut{font-size:13px!important; color:var(--dim)!important}
  .clipFrameSummary{display:flex; justify-content:space-between; gap:10px; padding:2px 0 4px;
    color:var(--dim); font-size:14px; font-variant-numeric:tabular-nums}
  .clipFrameSummary output{color:var(--text)}
  .stepper{flex:1 1 0; display:flex; align-items:center; justify-content:center; min-height:44px}
  .stepper button{flex:0 0 44px; width:44px; min-height:44px; padding:0;
    border:none; border-radius:999px; background:transparent; color:var(--text);
    font-size:26px; font-weight:400; line-height:1}
  .stepper button:active{background:var(--line)}   /* momentary press feedback only — no resting fill */
  .stepUnit{flex:0 1 auto; text-align:center; padding:0 2px;
    font-size:13px; color:var(--dim); white-space:nowrap; user-select:none; pointer-events:none}

  .hitTimeline{position:relative; height:88px; border-radius:8px; overflow:hidden;
    background:var(--strip-bg); border:1px solid var(--line); touch-action:none; cursor:pointer}
  #trackStrip{position:absolute; inset:0; width:100%; height:100%; display:block}
  #hitBars{position:absolute; inset:0}
  .hitBar{position:absolute; top:0; bottom:0; width:36px; margin-left:-18px; cursor:pointer;
    display:flex; justify-content:center}
  .hitBar::before{content:''; width:7px; height:100%; border-radius:3px;
    box-shadow:0 0 0 1px rgba(0,0,0,.5)}
  .hitBar.in::before{background:var(--in)}
  .hitBar.out::before{background:var(--outcall)}
  .hitBar.unknown::before{background:#999}
  .hitBar.racket::before{background:#5b7fa6; width:4px; opacity:.55}
  .hitBar.floor::before{background:#b58a3c; width:4px; opacity:.55}
  .hitBar.side::before{background:#8a6fb8; width:4px; opacity:.55}
  #trackCursor{position:absolute; top:0; bottom:0; width:3px; margin-left:-1px; background:#f5f5f5;
    box-shadow:0 0 0 1px rgba(0,0,0,.45); pointer-events:none}

  /* The verdict box always occupies the same space: empty (blank), event
     classification (neutral), and IN/OUT states share one reserved height so
     showing or clearing a verdict never shifts the layout around it. */
  .verdict{border-radius:12px; padding:14px; text-align:center; font-size:13px; line-height:1.4;
    min-height:118px; display:flex; flex-direction:column; justify-content:center}
  .verdict strong{display:block; font-size:38px; letter-spacing:.04em}
  .verdict.in{background:var(--in); color:#03230c}
  .verdict.out{background:var(--outcall); color:#fff}
  .verdict.neutral{background:var(--surface); border:1px solid var(--line); color:var(--text)}
  .verdict.blank{background:transparent; border:1px dashed var(--line); color:var(--dim)}

  /* video kept renderable but invisible (display:none breaks canvas capture on some iOS versions) */
  #vid{position:absolute; width:2px; height:2px; opacity:0; pointer-events:none; left:-10px; top:-10px}
</style>
</head>
<body>

<div id="errBanner" class="hidden">
  <span id="errText"></span>
  <button id="errClose" type="button">Dismiss</button>
</div>

<header>
  <button class="small hidden" id="hdrBack" type="button">&#8249; Back</button>
  <div id="stepLabel">Squash Line Calling</div>
  <button class="small" id="themeBtn" type="button">
    <svg class="sun-and-moon" width="24" height="24" viewBox="0 0 24 24" aria-hidden="true">
      <mask class="moonmask" id="moonMask">
        <rect width="100%" height="100%" fill="#fff"/>
        <circle cx="24" cy="10" r="6" fill="#000"/>
      </mask>
      <circle class="sun" cx="12" cy="12" r="6" fill="currentColor" mask="url(#moonMask)"/>
      <g class="sun-beams" stroke="currentColor" stroke-linecap="round">
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </g>
    </svg>
  </button>
</header>
<p id="instr" class="hidden"></p>

<div id="stage" class="hidden">
  <canvas id="view"></canvas>
  <div id="zoomCtrl" class="hidden">
    <button class="small" id="zoomOutBtn" type="button">−</button>
    <button class="small" id="zoomResetBtn" type="button">1×</button>
    <button class="small" id="zoomInBtn" type="button">+</button>
  </div>
</div>

<main>
  <!-- PHASE: load -->
  <section class="hidden" id="p-load">
    <p class="instruction">Load a clip from this phone to begin.</p>
    <label class="filebtn">Load clip
      <input type="file" id="fileIn" accept="video/*">
    </label>
    <p class="status" id="loadStatus"></p>
  </section>

  <!-- PHASE: frame -->
  <section class="hidden" id="p-frame">
    <input type="range" id="scrub" min="0" max="1" step="0.01" value="0">
    <div class="nudgeRow">
      <div class="stepper">
        <button type="button" id="bwd1s" aria-label="Back one second">&minus;</button>
        <span class="stepUnit">second</span>
        <button type="button" id="fwd1s" aria-label="Forward one second">+</button>
      </div>
      <div class="stepper">
        <button type="button" id="bwd1f" aria-label="Back one frame">&minus;</button>
        <span class="stepUnit">frame</span>
        <button type="button" id="fwd1f" aria-label="Forward one frame">+</button>
      </div>
    </div>
    <button class="primary" id="useFrame">Use this frame</button>
  </section>

  <!-- PHASE: tap out / tap tin -->
  <section class="hidden" id="p-tap">
    <button class="primary" id="confirmBtn" disabled>Looks right</button>
    <div class="row"><button class="small" id="clearTapsBtn" disabled>Clear selection</button></div>
    <div>
      <div class="sliderlabel"><span>Fill tolerance</span><output id="fillTolOut">35</output></div>
      <input type="range" id="fillTol" min="5" max="60" step="1" value="35">
    </div>
    <p class="status" id="tapStatus"></p>
  </section>

  <!-- PHASE: review -->
  <section class="hidden" id="p-review">
    <button class="primary" id="chooseClipBtn">Use these lines</button>
    <p class="status" id="reviewWarn"></p>
  </section>

  <!-- PHASE: clip -->
  <section class="hidden" id="p-clip">
    <div class="clipOverview" id="clipOverview">
      <canvas id="overviewStrip"></canvas>
      <div id="overviewSelection"></div>
      <div id="overviewViewport"></div>
    </div>
    <div class="clipEditor" id="clipEditor">
      <canvas id="filmstrip"></canvas>
      <div class="clipShade" id="shadeLeft"></div>
      <div class="clipShade" id="shadeRight"></div>
      <div id="clipSelection"></div>
      <div class="clipHandle" id="clipStartHandle"></div>
      <div class="clipHandle" id="clipEndHandle"></div>
      <div id="clipCursor"></div>
    </div>
    <div class="nudgeRow">
      <span class="nudgeLabel">Start<output id="clipStartOut">0.00s</output><output class="frameOut" id="clipStartFrameOut">Frame 0</output></span>
      <div class="stepper">
        <button type="button" id="nStartM1s" aria-label="Start earlier one second">&minus;</button>
        <span class="stepUnit">second</span>
        <button type="button" id="nStartP1s" aria-label="Start later one second">+</button>
      </div>
      <div class="stepper">
        <button type="button" id="nStartM1f" aria-label="Start earlier one frame">&minus;</button>
        <span class="stepUnit">frame</span>
        <button type="button" id="nStartP1f" aria-label="Start later one frame">+</button>
      </div>
    </div>
    <div class="nudgeRow">
      <span class="nudgeLabel">End<output id="clipEndOut">0.00s</output><output class="frameOut" id="clipEndFrameOut">Frame 0</output></span>
      <div class="stepper">
        <button type="button" id="nEndM1s" aria-label="End earlier one second">&minus;</button>
        <span class="stepUnit">second</span>
        <button type="button" id="nEndP1s" aria-label="End later one second">+</button>
      </div>
      <div class="stepper">
        <button type="button" id="nEndM1f" aria-label="End earlier one frame">&minus;</button>
        <span class="stepUnit">frame</span>
        <button type="button" id="nEndP1f" aria-label="End later one frame">+</button>
      </div>
    </div>
    <div class="clipFrameSummary">
      <span>Selected frames</span>
      <output id="clipFrameRangeOut">0-0 (1 frame)</output>
    </div>
    <div class="progressbox hidden" id="trackProgressBox">
      <div class="stat"><span id="progressLabel">Uploading</span><span id="progressPct">0%</span></div>
      <div class="progressbar" id="trackProgress"><span></span></div>
    </div>
    <div class="row">
      <button id="clipPlayBtn" type="button">Play preview</button>
      <button class="primary" id="runTrackBtn">Track ball</button>
    </div>
    <p class="status" id="trackStatus"></p>
  </section>

  <!-- PHASE: track + judge -->
  <section class="hidden" id="p-track">
    <div class="hitTimeline hidden" id="hitTimeline">
      <canvas id="trackStrip"></canvas>
      <div id="hitBars"></div>
      <div id="trackCursor"></div>
    </div>
    <p class="status" id="hitsStatus"></p>
    <div class="sliderlabel"><span>Frame to judge</span><output id="judgeFrameOut"></output></div>
    <div class="row">
      <input type="number" id="judgeFrame" step="1">
      <button class="primary" id="judgeBtn">Judge frame</button>
    </div>
    <div class="verdict blank" id="judgeResult"><div>No line call yet</div></div>
  </section>
</main>

<video id="vid" playsinline muted preload="metadata"></video>

<script>
'use strict';
const $ = id => document.getElementById(id);
const vid = $('vid'), canvas = $('view'), ctx = canvas.getContext('2d', {willReadFrequently:true});
const stage = $('stage');

const CFG = {
  out: { key:'out', label:'OUT line', edge:'max', css:'var(--out)', hex:'#35e0ff',
         rgb:[53,224,255], edgeName:'out_line_lower_edge',
         edgeDesc:'lower edge of the out line (ball at or above this is OUT)' },
  tin: { key:'tin', label:'TIN', edge:'min', css:'var(--tin)', hex:'#b4ff3a',
         rgb:[180,255,58], edgeName:'tin_top_edge',
         edgeDesc:'top edge of the tin (ball at or below this is DOWN)' },
};
const ORDER = ['out','tin'];
const MIN_COLS = 40;          // minimum horizontal span (in columns) for a trustworthy fit
const FILL_CAP_FRAC = 0.25;   // abort fill if it exceeds this fraction of the frame
const DEFAULT_FILL_TOL = 35;

const S = {
  phase:'load', W:0, H:0, videoName:'', frameTime:0,
  videoFile:null,
  fillTol:DEFAULT_FILL_TOL,
  loadTimer:null,
  base:null,                  // ImageData of the locked frame
  work:null,                  // {key, seeds:[[x,y],...], mask, maskCanvas, fit, msg, msgKind}
  lines:{out:null, tin:null}, // committed: {seeds, maskCanvas, fit}
  run:null,                   // backend tracking result
  trackSeekId:0,
  trackStripGen:0,            // invalidates in-flight timeline thumbnail renders
  videoFps:null,              // probed by the server at upload; null until known
  clip:{start:0, end:0, cursor:0, dragging:null, playing:false, raf:null, frameStride:1, inferenceWidth:960,
    viewStart:0, viewEnd:1,   // detail-strip visible window (seconds)
    overviewThumbs:false, overviewDragging:false,
    detailKey:'', detailToken:0, detailTimer:null,
    pendingSeek:null, seeking:false},
  view:{scale:1, tx:0, ty:0}, // zoom/pan applied to the canvas while tapping
};

/* ---------- phase / UI ---------- */
const STEP_META = {
  load:   {label:'Squash Line Calling', instr:''},
  frame:  {label:'1 / 6 · Pick a frame', instr:'Scrub to a frame where both red lines are fully visible and unblocked.'},
  tap_out:{label:'2 / 6 · Mark the out line', instr:''},
  tap_tin:{label:'3 / 6 · Mark the tin', instr:''},
  review: {label:'4 / 6 · Review lines', instr:'Check that each fitted edge hugs the real paint edge across the whole line.'},
  clip:   {label:'5 / 6 · Clip & track', instr:'Drag the top strip to slide the clip along the video, then drag the handles to trim it tight around the shot.'},
  track:  {label:'6 / 6 · Call', instr:'Tap a hit bar or enter a frame number, then judge it.'},
};

function setPhase(p){
  if(S.phase === 'clip' && p !== 'clip') stopClipPlayback();
  S.phase = p;
  resetZoom();
  stage.classList.toggle('hidden', p === 'load');
  document.body.classList.toggle('phase-load', p === 'load');
  for(const id of ['p-load','p-frame','p-tap','p-review','p-clip','p-track']) $(id).classList.add('hidden');
  $('stepLabel').textContent = STEP_META[p].label;
  $('hdrBack').classList.toggle('hidden', p === 'load');

  if(p === 'tap_out' || p === 'tap_tin'){
    const c = CFG[curKey()];
    $('instr').innerHTML = `Tap the red paint of the <b class="${c.key}">${c.label}</b>. If glare breaks the selection, tap the missed stretch to extend it. Pinch to zoom for a precise tap.`;
    $('instr').classList.remove('hidden');
  } else {
    $('instr').textContent = STEP_META[p].instr;
    $('instr').classList.toggle('hidden', !STEP_META[p].instr);
  }

  if(p === 'load'){ $('p-load').classList.remove('hidden'); }
  if(p === 'frame'){ $('p-frame').classList.remove('hidden'); }
  if(p === 'tap_out' || p === 'tap_tin'){
    $('p-tap').classList.remove('hidden');
    $('confirmBtn').disabled = !(S.work && S.work.fit);
    $('zoomCtrl').classList.remove('hidden');
    updateTapStatus();
  } else {
    $('zoomCtrl').classList.add('hidden');
  }
  if(p === 'review'){ $('p-review').classList.remove('hidden'); buildReview(); }
  if(p === 'clip'){ $('p-clip').classList.remove('hidden'); setupClipControls(); }
  if(p === 'track'){ $('p-track').classList.remove('hidden'); buildTrackView(); }
  render();
}
const curKey = () => S.phase === 'tap_out' ? 'out' : 'tin';

/* ---------- video loading & scrubbing ---------- */
async function checkBackend(){
  try{
    const response = await fetch('/api/health', {cache:'no-store'});
    if(!response.ok) throw new Error();
    $('loadStatus').textContent = 'Backend connected.';
    $('loadStatus').className = 'status ok';
  } catch(_){
    showError('Backend not reachable. Open this page from the Flask server, not as a file.');
  }
}

$('fileIn').addEventListener('change', e => {
  const f = e.target.files[0];
  if(!f) return;
  S.videoFile = f;
  S.videoName = f.name;
  S.videoFps = null;
  S.clip.overviewThumbs = false;
  S.clip.detailKey = '';
  $('loadStatus').textContent = `Loading ${f.name}…`;
  $('loadStatus').className = 'status';
  if(S.loadTimer) clearTimeout(S.loadTimer);
  S.loadTimer = setTimeout(() => {
    if(S.phase === 'load'){

      $('loadStatus').className = 'status warn';
    }
  }, 4000);
  vid.src = URL.createObjectURL(f);
  vid.load();
});
vid.addEventListener('loadedmetadata', () => {

$('bwd1s').onclick = () => nudge(-1);

/* ---------- zoom / pan (active during tap phases only) ---------- */
const MAX_ZOOM = 6;
const TAP_MOVE_PX = 10;         // pointer movement above this = drag/pinch, not a tap
const clamp01 = (v, lo, hi) => Math.min(hi, Math.max(lo, v));

function clampPan(tx, ty, s){
  const natW = canvas.clientWidth, natH = canvas.clientHeight;
  return [clamp01(tx, natW * (1 - s), 0), clamp01(ty, natH * (1 - s), 0)];
}
function applyViewTransform(){
  const { scale, tx, ty } = S.view;
  canvas.style.transform = scale === 1 ? '' : `translate(${tx}px, ${ty}px) scale(${scale})`;
  $('zoomResetBtn').textContent = scale.toFixed(1) + '×';
}
function resetZoom(){
  S.view = { scale:1, tx:0, ty:0 };
  applyViewTransform();
}
function zoomBy(factor){
  const natW = canvas.clientWidth, natH = canvas.clientHeight;
  const midX = natW / 2, midY = natH / 2;
  const sOld = S.view.scale;
  const sNew = clamp01(sOld * factor, 1, MAX_ZOOM);
  const cx = (midX - S.view.tx) / sOld, cy = (midY - S.view.ty) / sOld;
  let [tx, ty] = clampPan(midX - cx * sNew, midY - cy * sNew, sNew);
  S.view = { scale:sNew, tx, ty };
  applyViewTransform();
}
$('zoomInBtn').onclick = () => zoomBy(1.6);
$('zoomOutBtn').onclick = () => zoomBy(1 / 1.6);
$('zoomResetBtn').onclick = () => resetZoom();

/* ---------- tapping (single finger = tap-to-select; two fingers = pinch zoom/pan) ---------- */
const pointers = new Map();
let pinch = null;

canvas.addEventListener('pointerdown', e => {
  if(S.phase !== 'tap_out' && S.phase !== 'tap_tin') return;
  e.preventDefault();
  canvas.setPointerCapture(e.pointerId);
  pointers.set(e.pointerId, { x:e.clientX, y:e.clientY, startX:e.clientX, startY:e.clientY, moved:false, multi:false });

  if(pointers.size >= 2){
    for(const pp of pointers.values()) pp.multi = true;
    const pts = [...pointers.values()].slice(0, 2);
    const r = stage.getBoundingClientRect();
    pinch = {
      prevDist: Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y),
      prevMidX: (pts[0].x + pts[1].x) / 2 - r.left,
      prevMidY: (pts[0].y + pts[1].y) / 2 - r.top,
    };
  }
});

canvas.addEventListener('pointermove', e => {
  const p = pointers.get(e.pointerId);
  if(!p) return;
  e.preventDefault();
  if(Math.hypot(e.clientX - p.startX, e.clientY - p.startY) > TAP_MOVE_PX) p.moved = true;
  const dx = e.clientX - p.x, dy = e.clientY - p.y;
  p.x = e.clientX; p.y = e.clientY;

  if(pointers.size === 2 && pinch){
    const pts = [...pointers.values()];
    const r = stage.getBoundingClientRect();
    const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
    const midX = (pts[0].x + pts[1].x) / 2 - r.left;
    const midY = (pts[0].y + pts[1].y) / 2 - r.top;
    const sOld = S.view.scale;
    const sNew = clamp01(sOld * (dist / pinch.prevDist), 1, MAX_ZOOM);
    const cx = (pinch.prevMidX - S.view.tx) / sOld;
    const cy = (pinch.prevMidY - S.view.ty) / sOld;
    const [tx, ty] = clampPan(midX - cx * sNew, midY - cy * sNew, sNew);
    S.view = { scale:sNew, tx, ty };
    applyViewTransform();
    pinch.prevDist = dist; pinch.prevMidX = midX; pinch.prevMidY = midY;
  } else if(pointers.size === 1 && S.view.scale > 1){
    const [tx, ty] = clampPan(S.view.tx + dx, S.view.ty + dy, S.view.scale);
    S.view.tx = tx; S.view.ty = ty;
    applyViewTransform();
  }
});

function endPointer(e){
  const p = pointers.get(e.pointerId);
  pointers.delete(e.pointerId);
  if(pointers.size < 2) pinch = null;
  if(!p) return;
  if((S.phase === 'tap_out' || S.phase === 'tap_tin') && !p.moved && !p.multi && pointers.size === 0){
    const r = canvas.getBoundingClientRect();
    const x = Math.min(S.W - 1, Math.max(0, Math.round((p.x - r.left) * S.W / r.width)));
    const y = Math.min(S.H - 1, Math.max(0, Math.round((p.y - r.top) * S.H / r.height)));
    buildWork(curKey(), x, y);
  }
}
canvas.addEventListener('pointerup', endPointer);
canvas.addEventListener('pointercancel', endPointer);

$('clearTapsBtn').onclick = () => {
  S.work = null;
  $('confirmBtn').disabled = true;
  updateTapStatus();
  render();
};

function updateFillTolOutput(){
  $('fillTolOut').textContent = S.fillTol.toString();
}

function rebuildWorkFromSeeds(key, seeds){
  S.work = null;
  for(const [x, y] of seeds) buildWork(key, x, y);
}

$('fillTol').addEventListener('input', e => {
  S.fillTol = +e.target.value;
  updateFillTolOutput();
});

$('fillTol').addEventListener('change', () => {
  if(!S.work || !S.work.seeds.length) return;
  rebuildWorkFromSeeds(S.work.key, S.work.seeds);
});

$('confirmBtn').onclick = () => {
  if(!S.work || !S.work.fit) return;
  const k = S.work.key;
  S.lines[k] = { seeds:S.work.seeds, maskCanvas:S.work.maskCanvas, fit:S.work.fit };
  S.work = null;
  setPhase(k === 'out' ? 'tap_tin' : 'review');
};

/* ---------- flood fill (HSV similarity) ---------- */
function rgb2hsv(r, g, b){
  r/=255; g/=255; b/=255;
  const mx = Math.max(r,g,b), mn = Math.min(r,g,b), d = mx - mn;
  let h = 0;
  if(d !== 0){
    if(mx === r) h = ((g - b) / d) % 6;
    else if(mx === g) h = (b - r) / d + 2;
    else h = (r - g) / d + 4;
    h *= 60; if(h < 0) h += 360;
  }
  return [h, mx === 0 ? 0 : d / mx, mx];
}

function hsvClose(hsv, seed, tol){
  const hueTol = 6 + tol * 0.34;              // 6°–40°
  const satTol = 0.18 + tol * 0.004;          // 0.18–0.58
  const valTol = 0.25 + tol * 0.0045;         // 0.25–0.70
  let dh = Math.abs(hsv[0] - seed[0]); if(dh > 180) dh = 360 - dh;
  return dh <= hueTol && Math.abs(hsv[1]-seed[1]) <= satTol && Math.abs(hsv[2]-seed[2]) <= valTol;
}

function floodFill(imgData, W, H, sx, sy, tol){
  const px = imgData.data;
  const si = sy * W + sx;
  const seed = rgb2hsv(px[si*4], px[si*4+1], px[si*4+2]);
  const mask = new Uint8Array(W * H);
  const cap = Math.floor(W * H * FILL_CAP_FRAC);
  const stack = [si];
  mask[si] = 1;
  let count = 1, overflow = false;

  const ok = i => {
    const j = i * 4;
    return hsvClose(rgb2hsv(px[j], px[j+1], px[j+2]), seed, tol);
  };

  while(stack.length){
    const i = stack.pop();
    const x = i % W, y = (i / W) | 0;
    // 4-neighbours
    if(x > 0     && !mask[i-1] && ok(i-1)){ mask[i-1] = 1; stack.push(i-1); count++; }
    if(x < W-1   && !mask[i+1] && ok(i+1)){ mask[i+1] = 1; stack.push(i+1); count++; }
    if(y > 0     && !mask[i-W] && ok(i-W)){ mask[i-W] = 1; stack.push(i-W); count++; }
    if(y < H-1   && !mask[i+W] && ok(i+W)){ mask[i+W] = 1; stack.push(i+W); count++; }
    if(count > cap){ overflow = true; break; }
  }
  return { mask, count, overflow, seedHsv: seed };
}

/* ---------- edge extraction + fitting ---------- */
function extractEdge(mask, W, H, mode){          // mode: 'min' (top edge) | 'max' (lower edge)
  const ext = new Int32Array(W).fill(-1);
  for(let y = 0; y < H; y++){
    const row = y * W;
    for(let x = 0; x < W; x++){
      if(mask[row + x]){
        if(mode === 'max') ext[x] = y;           // scanning downward: last hit = max
        else if(ext[x] === -1) ext[x] = y;       // first hit = min
      }
    }
  }
  const xs = [], ys = [];
  for(let x = 0; x < W; x++) if(ext[x] >= 0){ xs.push(x); ys.push(ext[x]); }
  return {
    xs,
    ys,
    xMin: xs.length ? xs[0] : 0,
    xMax: xs.length ? xs[xs.length - 1] : 0,
  };
}

function lsq(xs, ys){
  const n = xs.length;
  let sx=0, sy=0, sxx=0, sxy=0;
  for(let i=0;i<n;i++){ sx+=xs[i]; sy+=ys[i]; sxx+=xs[i]*xs[i]; sxy+=xs[i]*ys[i]; }
  const den = n*sxx - sx*sx;
  if(den === 0) return null;
  const m = (n*sxy - sx*sy) / den;
  const b = (sy - m*sx) / n;
  let se = 0;
  for(let i=0;i<n;i++){ const r = ys[i] - (m*xs[i] + b); se += r*r; }
  return { m, b, rms: Math.sqrt(se/n), n };
}

const RANSAC_THR = 3;         // inlier distance (px) — sidewall tails bend away past this within a few columns

/* RANSAC candidate line. The sidewall out-lines are coherent segments (not
   noise), so a mean-based rejection pass can't remove them — and when the
   camera is tilted their pull no longer cancels. The front-wall span is the
   longest segment, so maximizing inliers locks onto it. Seeded LCG keeps the
   fit deterministic for a given selection. */
function ransacLine(xs, ys){
  const n = xs.length;
  const minSep = Math.max(10, (xs[n-1] - xs[0]) * 0.2);
  let seed = 0x2F6E2B1;
  const rand = () => ((seed = (seed * 1103515245 + 12345) & 0x7fffffff) / 0x7fffffff);
  let best = null, bestCount = 0;
  for(let it = 0; it < 400; it++){
    const i = (rand() * n) | 0, j = (rand() * n) | 0;
    if(Math.abs(xs[i] - xs[j]) < minSep) continue;
    const m = (ys[j] - ys[i]) / (xs[j] - xs[i]);
    const b = ys[i] - m * xs[i];
    let cnt = 0;
    for(let k = 0; k < n; k++) if(Math.abs(ys[k] - (m*xs[k] + b)) <= RANSAC_THR) cnt++;
    if(cnt > bestCount){ bestCount = cnt; best = { m, b }; }
  }
  return bestCount >= MIN_COLS ? best : null;
}

function robustFit(xs, ys){
  let f = null;
  const cand = ransacLine(xs, ys);
  if(cand){
    // Refit on the longest contiguous run of inliers only, so the fitted span
    // ends at the front-wall corners and stray collinear pixels elsewhere
    // (e.g. where a sidewall line crosses the band) can't stretch it.
    const maxGap = Math.max(16, (xs[xs.length-1] - xs[0]) * 0.05);
    const runs = [];
    let cur = [];
    for(let i = 0; i < xs.length; i++){
      if(Math.abs(ys[i] - (cand.m*xs[i] + cand.b)) > RANSAC_THR) continue;
      if(cur.length && xs[i] - xs[cur[cur.length-1]] > maxGap){ runs.push(cur); cur = []; }
      cur.push(i);
    }
    if(cur.length) runs.push(cur);
    runs.sort((a, b) => b.length - a.length);
    if(runs.length && runs[0].length >= MIN_COLS){
      // Keep every long collinear run, not just the longest: glare can split
      // the selection into segments that all lie on the real line, and the
      // span must still reach the corners. Short runs (a sidewall crossing
      // the band, stray specks) stay excluded.
      const minRun = Math.max(25, runs[0].length * 0.2);
      const idx = runs.filter(r => r.length >= minRun).flat().sort((a, b) => a - b);
      const kx = idx.map(i => xs[i]), ky = idx.map(i => ys[i]);
      const f2 = lsq(kx, ky);
      if(f2){ f = f2; f.xMin = kx[0]; f.xMax = kx[kx.length - 1]; }
    }
  }
  if(!f){                                        // fallback: global fit + one rejection pass
    f = lsq(xs, ys);
    if(!f) return null;
    const thr = Math.max(2, 2.5 * f.rms);
    const kx = [], ky = [];
    for(let i=0;i<xs.length;i++){
      if(Math.abs(ys[i] - (f.m*xs[i] + f.b)) <= thr){ kx.push(xs[i]); ky.push(ys[i]); }
    }
    if(kx.length >= MIN_COLS && kx.length < xs.length){
      const f2 = lsq(kx, ky);
      if(f2){
        f = f2;
        f.xMin = Math.min(...kx);
        f.xMax = Math.max(...kx);
      }
    }
  }
  if(!Number.isFinite(f.xMin) || !Number.isFinite(f.xMax)){
    f.xMin = Math.min(...xs);
    f.xMax = Math.max(...xs);
  }
  f.total = xs.length;
  f.trimmed = f.total - f.n;
  return f;
}

/* ---------- build working selection ---------- */
/* Probe along the fitted line beyond both ends of the current selection for
   pixels that still match the band colour — paint continuing past a glare
   break lies on the same straight line, so the fit tells us where to look. */
function findExtensionSeed(mask, fit, mode, seedHsv, tol){
  const px = S.base.data, W = S.W, H = S.H;
  const reach = Math.round(W * 0.3);
  const into = mode === 'min' ? 1 : -1;       // step into the band: below a top edge, above a lower edge
  for(const dir of [-1, 1]){
    const x0 = Math.round(dir < 0 ? fit.xMin : fit.xMax);
    for(let d = 6; d <= reach; d += 3){
      const x = x0 + dir * d;
      if(x < 1 || x >= W - 1) break;
      const yLine = fit.m * x + fit.b;
      for(const off of [3, 5, 8]){
        const y = Math.round(yLine + into * off);
        if(y < 1 || y >= H - 1) continue;
        const i = y * W + x;
        if(mask[i]) continue;
        const j = i * 4;
        if(hsvClose(rgb2hsv(px[j], px[j+1], px[j+2]), seedHsv, tol)) return { x, y };
      }
    }
  }
  return null;
}

function extendAlongFit(mask, cfgEdge, fit, seedHsv, tol){
  let edge = null;
  for(let pass = 0; pass < 8; pass++){
    const pt = findExtensionSeed(mask, fit, cfgEdge, seedHsv, tol);
    if(!pt) break;
    const extra = floodFill(S.base, S.W, S.H, pt.x, pt.y, tol);
    if(extra.overflow || extra.count < 25) break;
    let grew = false;
    for(let i = 0; i < mask.length; i++) if(extra.mask[i] && !mask[i]){ mask[i] = 1; grew = true; }
    if(!grew) break;
    const e2 = extractEdge(mask, S.W, S.H, cfgEdge);
    const f2 = robustFit(e2.xs, e2.ys);
    if(!f2) break;
    fit = f2; edge = e2;
  }
  return { fit, edge };
}

function buildWork(key, sx, sy){
  const tol = S.fillTol;
  const cfg = CFG[key];
  const prev = (S.work && S.work.key === key && S.work.fit) ? S.work : null;
  const fill = floodFill(S.base, S.W, S.H, sx, sy, tol);

  if(fill.overflow && prev){                   // bad extension tap: keep what we had
    prev.msg = 'That tap leaked off the line and was ignored — selection kept. Tap a cleaner spot to extend.';
    prev.msgKind = 'warn';
    updateTapStatus();
    render();
    return;
  }

  const mask = fill.mask;
  if(prev) for(let i = 0; i < mask.length; i++) if(prev.mask[i]) mask[i] = 1;   // taps accumulate

  const seeds = prev ? prev.seeds.concat([[sx, sy]]) : [[sx, sy]];
  const work = { key, seeds, mask, fit:null, msg:'', msgKind:'' };

  if(fill.overflow){
    work.msg = 'Fill leaked off the line — lower the tolerance or tap a cleaner spot.';
    work.msgKind = 'warn';
  } else {
    let edge = extractEdge(mask, S.W, S.H, cfg.edge);
    if(edge.xs.length < MIN_COLS){
      work.msg = `Selection too small (${edge.xs.length} columns) — tap on the painted band, or raise the tolerance.`;
      work.msgKind = 'warn';
    } else {
      let fit = robustFit(edge.xs, edge.ys);
      if(fit){
        const ext = extendAlongFit(mask, cfg.edge, fit, fill.seedHsv, tol);
        fit = ext.fit;
        if(ext.edge) edge = ext.edge;
        work.fit = fit;
        work.msg = `Fitted through ${fit.n.toLocaleString()} edge pixels · RMS ${fit.rms.toFixed(2)} px · span ${edge.xs.length} columns`;
        if(fit.trimmed >= MIN_COLS) work.msg += ` · dropped ${fit.trimmed} columns (sidewall/outliers)`;
        work.msgKind = fit.rms <= 2 ? 'ok' : 'warn';
        if(fit.rms > 2) work.msg += ' — edge is wobbly; try lower tolerance or a cleaner frame.';
        else work.msg += ' — if the line stops short, tap the missed stretch to extend.';
      } else {
        work.msg = 'Could not fit a line to that selection.'; work.msgKind = 'warn';
      }
    }
  }

  work.maskCanvas = maskToCanvas(mask, S.W, S.H, cfg.rgb, 110);
  S.work = work;
  $('confirmBtn').disabled = !work.fit;
  updateTapStatus();
  render();
}

function updateTapStatus(){
  const el = $('tapStatus');
  $('clearTapsBtn').disabled = !S.work;
  if(!S.work){ el.textContent = 'Tap the line to select it first.'; el.className = 'status'; return; }
  el.textContent = S.work.msg;
  el.className = 'status ' + S.work.msgKind;
}

/* ---------- rendering ---------- */
function maskToCanvas(mask, W, H, rgb, alpha){
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const cc = c.getContext('2d');
  const img = cc.createImageData(W, H);
  const d = img.data;
  for(let i = 0; i < mask.length; i++){
    if(mask[i]){ const j = i*4; d[j]=rgb[0]; d[j+1]=rgb[1]; d[j+2]=rgb[2]; d[j+3]=alpha; }
  }
  cc.putImageData(img, 0, 0);
  return c;
}

function drawFitLine(fit, color){
  const x0 = Number.isFinite(fit.xMin) ? fit.xMin : 0;
  const x1 = Number.isFinite(fit.xMax) ? fit.xMax : S.W - 1;
  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = Math.max(2, S.W / 700);
  ctx.beginPath();
  ctx.moveTo(x0, fit.m * x0 + fit.b);
  ctx.lineTo(x1, fit.m * x1 + fit.b);
  ctx.stroke();
  ctx.restore();
}

function render(){
  if(!S.base) return;
  if(S.phase === 'track') return;
  ctx.putImageData(S.base, 0, 0);
  for(const k of ORDER){
    const L = S.lines[k];
    if(L){
      ctx.save(); ctx.globalAlpha = 0.5; ctx.drawImage(L.maskCanvas, 0, 0); ctx.restore();
      drawFitLine(L.fit, CFG[k].hex);
    }
  }
  if(S.work){
    ctx.drawImage(S.work.maskCanvas, 0, 0);
    if(S.work.fit) drawFitLine(S.work.fit, CFG[S.work.key].hex);
    ctx.save();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = Math.max(2, S.W / 900);
    const r = Math.max(8, S.W / 120);
    for(const [x, y] of S.work.seeds){
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.stroke();
    }
    ctx.restore();
  }
}

/* ---------- review & export ---------- */
function midY(fit){ return fit.m * (S.W / 2) + fit.b; }

function buildReview(){
  const w = $('reviewWarn');
  const out = S.lines.out.fit, tin = S.lines.tin.fit;

  // Both lines span the same 21 ft front wall, so their endpoints should
  // roughly agree in x. The tin is the more trustworthy of the two (its paint
  // doesn't continue onto the sidewalls), so when an out-line endpoint
  // disagrees badly — truncated by glare, or leaked — snap it to the tin's,
  // keeping the out line's own slope/intercept.
  const tinSpan = tin.xMax - tin.xMin;
  let snapped = false;
  if(tinSpan > 0){
    const tolPx = tinSpan * 0.08;
    if(Math.abs(out.xMin - tin.xMin) > tolPx){ out.xMin = tin.xMin; snapped = true; }
    if(Math.abs(out.xMax - tin.xMax) > tolPx){ out.xMax = tin.xMax; snapped = true; }
    if(snapped) out.snappedToTin = true;
  }

  const notes = [];
  if(snapped) notes.push('Out-line span disagreed with the tin — endpoints snapped to the tin’s span (angle kept).');
  if(midY(out) >= midY(tin)) notes.push('Warning: the out line was fitted below the tin — go Back and redo the taps.');
  w.textContent = notes.join(' ');
  w.className = 'status' + (notes.length ? ' warn' : '');
  render();
}

function buildJson(){
  const line = k => {
    const c = CFG[k], f = S.lines[k].fit;
    const x0 = Number.isFinite(f.xMin) ? f.xMin : 0;
    const x1 = Number.isFinite(f.xMax) ? f.xMax : S.W - 1;
    const y0 = +(f.m * x0 + f.b).toFixed(2);
    const y1 = +(f.m * x1 + f.b).toFixed(2);
    return {
      name: c.edgeName,
      description: c.edgeDesc,
      endpoints: [[+x0.toFixed(2), y0], [+x1.toFixed(2), y1]],
      slope: f.m, intercept: f.b,
      fit_rms_px: +f.rms.toFixed(2),
      x_span_px: [+x0.toFixed(2), +x1.toFixed(2)],
      x_span_source: f.snappedToTin ? 'tin_top_edge' : 'fit',
      edge_pixels_used: f.n
    };
  };
  return {
    schema: 'squash-calibration-v1',
    coordinate_system: 'image pixels, origin top-left, y increases DOWNWARD',
    video_file: S.videoName,
    frame_width: S.W,
    frame_height: S.H,
    frame_time_s: +S.frameTime.toFixed(3),
    created_utc: new Date().toISOString(),
    lines: [line('out'), line('tin')]
  };
}

$('chooseClipBtn').onclick = () => setPhase('clip');

function fmtTime(value){
  return `${(+value).toFixed(2)}s`;
}

function videoFps(){
  return S.videoFps || S.run?.fps || 60;
}

function timeToFrame(time){
  return Math.max(0, Math.round(time * videoFps()));
}

function clipDuration(){
  return vid.duration || 1;
}

const MIN_CLIP = 0.5;             // seconds; smallest selectable clip
const MIN_VIEW_SPAN = 2;          // seconds; smallest detail-strip window
const EDGE_RECENTER_FRAC = 0.08;  // recenter when a handle lands this close to a view edge

function minClip(){
  return Math.min(MIN_CLIP, clipDuration());
}

function viewSpan(){
  return Math.max(0.001, S.clip.viewEnd - S.clip.viewStart);
}

function timeToDetailPct(time){
  return Math.min(1, Math.max(0, (time - S.clip.viewStart) / viewSpan())) * 100;
}

function detailPctToTime(pct){
  return S.clip.viewStart + Math.min(1, Math.max(0, pct)) * viewSpan();
}

function timeToOverviewPct(time){
  return Math.min(1, Math.max(0, time / clipDuration())) * 100;
}

function overviewPctToTime(pct){
  return Math.min(clipDuration(), Math.max(0, pct * clipDuration()));
}

// Fit the detail window around the selection (3x padding, clamped). Returns
// true when the window moved enough that the thumbnails need re-rendering.
function recenterView(){
  const duration = clipDuration();
  const selSpan = Math.max(0.001, S.clip.end - S.clip.start);
  let span = Math.min(duration, Math.max(MIN_VIEW_SPAN, selSpan * 3));
  let vs = 0;
  if(span >= 0.85 * duration){
    span = duration;
  } else {
    vs = (S.clip.start + S.clip.end) / 2 - span / 2;
    vs = Math.max(0, Math.min(vs, duration - span));
  }
  $('clipOverview').classList.toggle('hidden', span >= duration - 1e-6);
  const changed = Math.abs(vs - S.clip.viewStart) > span * 0.01
    || Math.abs(vs + span - S.clip.viewEnd) > span * 0.01;
  S.clip.viewStart = vs;
  S.clip.viewEnd = vs + span;
  return changed;
}

function drawClipPreview(time){
  if(!S.W || !S.H) return;
  ctx.drawImage(vid, 0, 0, S.W, S.H);
  for(const k of ORDER){
    const L = S.lines[k];
    if(L) drawFitLine(L.fit, CFG[k].hex);
  }
}

function updateClipPlayButton(){
  $('clipPlayBtn').textContent = S.clip.playing ? 'Pause preview' : 'Play preview';
}

function stopClipPlayback(){
  if(S.clip.raf) cancelAnimationFrame(S.clip.raf);
  S.clip.raf = null;
  S.clip.playing = false;
  vid.pause();
  updateClipPlayButton();
}

async function startClipPlayback(){
  if(S.phase !== 'clip' || S.clip.end <= S.clip.start) return;
  if(vid.currentTime < S.clip.start || vid.currentTime >= S.clip.end){
    await seekVideo(S.clip.start);
  }
  S.clip.cursor = vid.currentTime;
  updateClipTimeline();
  S.clip.playing = true;
  updateClipPlayButton();
  await vid.play();
  tickClipPlayback();
}

function tickClipPlayback(){
  if(!S.clip.playing || S.phase !== 'clip') return;
  if(vid.currentTime >= S.clip.end){
    vid.currentTime = S.clip.start;
  }
  S.clip.cursor = Math.min(Math.max(vid.currentTime, S.clip.start), S.clip.end);
  updateClipTimeline();
  drawClipPreview(S.clip.cursor);
  S.clip.raf = requestAnimationFrame(tickClipPlayback);
}

async function seekVideo(time){
  return new Promise(resolve => {
    const target = Math.min(Math.max(time, 0), clipDuration());
    if(Math.abs(vid.currentTime - target) < 0.001){
      requestAnimationFrame(resolve);
      return;
    }
    const done = () => {
      vid.removeEventListener('seeked', done);
      resolve();
    };
    vid.addEventListener('seeked', done, {once:true});
    vid.currentTime = target;
  });
}

// Show the newest requested frame in the preview canvas, keeping at most one
// video seek in flight (drags fire faster than the decoder can seek).
async function requestPreviewFrame(time){
  S.clip.pendingSeek = time;
  if(S.clip.seeking) return;
  S.clip.seeking = true;
  try{
    while(S.clip.pendingSeek !== null){
      const next = S.clip.pendingSeek;
      S.clip.pendingSeek = null;
      await seekVideo(next);
      drawClipPreview(next);
    }
  } finally {
    S.clip.seeking = false;
  }
}

const stripBg = () => getComputedStyle(document.documentElement)
  .getPropertyValue('--strip-bg').trim() || '#0a0a0c';

async function renderStripCanvas(canvasEl, boxEl, t0, t1, opts = {}){
  const box = boxEl.getBoundingClientRect();
  if(box.width < 4) return false;
  const dpr = window.devicePixelRatio || 1;
  canvasEl.width = Math.max(1, Math.round(box.width * dpr));
  canvasEl.height = Math.max(1, Math.round(box.height * dpr));
  const cc = canvasEl.getContext('2d');
  cc.setTransform(dpr, 0, 0, dpr, 0, 0);
  cc.fillStyle = stripBg();
  cc.fillRect(0, 0, box.width, box.height);
  if(opts.background) opts.background(cc, box.width, box.height);

  const count = Math.max(5, Math.min(12, Math.floor(box.width / 86)));
  const thumbW = box.width / count;
  const wasPlayingPreview = S.clip.playing;
  vid.pause();

  for(let i = 0; i < count; i++){
    if(opts.shouldAbort && opts.shouldAbort()) return false;
    const t = t0 + (i + 0.5) / count * (t1 - t0);
    await seekVideo(t);
    if(opts.shouldAbort && opts.shouldAbort()) return false;
    cc.drawImage(vid, i * thumbW, 0, thumbW, box.height);
    cc.strokeStyle = 'rgba(255,255,255,.12)';
    cc.strokeRect(i * thumbW, 0, thumbW, box.height);
  }

  await seekVideo(S.clip.cursor);
  drawClipPreview(S.clip.cursor);
  if(wasPlayingPreview) startClipPlayback();
  return true;
}

async function renderOverviewStrip(){
  if(S.clip.overviewThumbs) return;
  const ok = await renderStripCanvas($('overviewStrip'), $('clipOverview'), 0, clipDuration());
  if(ok) S.clip.overviewThumbs = true;
}

// Stretch the matching slice of the overview strip into the detail canvas —
// blurry but instant context while the real thumbnails render.
function paintDetailPlaceholder(cc, w, h){
  const ov = $('overviewStrip');
  if(!S.clip.overviewThumbs || !ov.width) return;
  const dur = clipDuration();
  const sx = S.clip.viewStart / dur * ov.width;
  const sw = Math.max(1, viewSpan() / dur * ov.width);
  cc.drawImage(ov, sx, 0, sw, ov.height, 0, 0, w, h);
}

function drawDetailPlaceholderNow(){
  const box = $('clipEditor').getBoundingClientRect();
  if(box.width < 4) return;
  const strip = $('filmstrip');
  const dpr = window.devicePixelRatio || 1;
  const bw = Math.max(1, Math.round(box.width * dpr));
  const bh = Math.max(1, Math.round(box.height * dpr));
  if(strip.width !== bw) strip.width = bw;
  if(strip.height !== bh) strip.height = bh;
  const cc = strip.getContext('2d');
  cc.setTransform(dpr, 0, 0, dpr, 0, 0);
  cc.fillStyle = stripBg();
  cc.fillRect(0, 0, box.width, box.height);
  paintDetailPlaceholder(cc, box.width, box.height);
}

async function renderDetailStrip(){
  const editor = $('clipEditor');
  const box = editor.getBoundingClientRect();
  if(box.width < 4) return;
  const key = `${S.clip.viewStart.toFixed(3)}:${S.clip.viewEnd.toFixed(3)}:${Math.round(box.width)}`;
  if(S.clip.detailKey === key) return;
  const token = ++S.clip.detailToken;
  const shouldAbort = () => token !== S.clip.detailToken || !!S.clip.dragging
    || S.clip.overviewDragging || S.clip.seeking || S.phase !== 'clip';
  const ok = await renderStripCanvas($('filmstrip'), editor, S.clip.viewStart, S.clip.viewEnd,
    {background: paintDetailPlaceholder, shouldAbort});
  if(token !== S.clip.detailToken) return;
  if(ok) S.clip.detailKey = key;
  else if(S.phase === 'clip') scheduleDetailRender();
}

function scheduleDetailRender(delayMs = 250){
  clearTimeout(S.clip.detailTimer);
  S.clip.detailTimer = setTimeout(() => {
    if(S.phase !== 'clip') return;
    if(S.clip.dragging || S.clip.overviewDragging){ scheduleDetailRender(delayMs); return; }
    renderDetailStrip();
  }, delayMs);
}

function updateClipTimeline(){
  const startPct = timeToDetailPct(S.clip.start);
  const endPct = timeToDetailPct(S.clip.end);
  const cursorPct = timeToDetailPct(S.clip.cursor);
  $('shadeLeft').style.width = `${startPct}%`;
  $('shadeRight').style.left = `${endPct}%`;
  $('shadeRight').style.width = `${100 - endPct}%`;
  $('clipSelection').style.left = `${startPct}%`;
  $('clipSelection').style.width = `${Math.max(0, endPct - startPct)}%`;
  $('clipStartHandle').style.left = `calc(${startPct}% - 1px)`;
  $('clipEndHandle').style.left = `calc(${endPct}% - 21px)`;
  const outOfView = t => t < S.clip.viewStart - 1e-6 || t > S.clip.viewEnd + 1e-6;
  $('clipStartHandle').classList.toggle('offview', outOfView(S.clip.start));
  $('clipEndHandle').classList.toggle('offview', outOfView(S.clip.end));
  $('clipCursor').style.left = `${cursorPct}%`;

  const oStart = timeToOverviewPct(S.clip.start);
  const oEnd = timeToOverviewPct(S.clip.end);
  $('overviewSelection').style.left = `${oStart}%`;
  $('overviewSelection').style.width = `${Math.max(0.5, oEnd - oStart)}%`;
  $('overviewViewport').style.left = `${timeToOverviewPct(S.clip.viewStart)}%`;
  $('overviewViewport').style.width = `${Math.max(0, timeToOverviewPct(S.clip.viewEnd) - timeToOverviewPct(S.clip.viewStart))}%`;
  updateClipLabels();
}

async function setClipCursor(time){
  stopClipPlayback();
  S.clip.cursor = Math.min(Math.max(time, 0), clipDuration());
  updateClipTimeline();
  await requestPreviewFrame(S.clip.cursor);
}

function setupClipControls(){
  const duration = clipDuration();
  if(S.clip.end <= S.clip.start || S.clip.end > duration){
    const center = S.frameTime || Math.min(duration / 2, 10);
    S.clip.start = Math.max(0, center - 2);
    S.clip.end = Math.min(duration, center + 2);
    S.clip.cursor = center;
  }

  recenterView();
  updateClipTimeline();
  updateClipPlayButton();
  (async () => {
    await setClipCursor(S.clip.cursor);
    await renderOverviewStrip();
    updateClipTimeline();
    await renderDetailStrip();
  })();
  // Upload in the background so fps is known while editing and Track starts faster.
  if(S.videoFile) ensureVideoUploaded(null).catch(() => {});
}

function updateClipLabels(){
  const start = S.clip.start;
  let end = S.clip.end;
  if(end - start < minClip()){
    end = Math.min(clipDuration(), start + minClip());
    S.clip.end = end;
  }
  const startFrame = timeToFrame(start);
  const endFrame = timeToFrame(end);
  const selectedFrames = Math.max(1, endFrame - startFrame + 1);
  $('clipStartOut').textContent = fmtTime(start);
  $('clipEndOut').textContent = fmtTime(end);
  $('clipStartFrameOut').textContent = `Frame ${startFrame}`;
  $('clipEndFrameOut').textContent = `Frame ${endFrame}`;
  $('clipFrameRangeOut').textContent = `${startFrame}-${endFrame} (${selectedFrames} frame${selectedFrames === 1 ? '' : 's'})`;
}

function nudgeClipEdge(which, delta){
  stopClipPlayback();
  let t;
  if(which === 'start'){
    t = Math.max(0, Math.min(S.clip.start + delta, S.clip.end - minClip()));
    S.clip.start = t;
  } else {
    t = Math.min(clipDuration(), Math.max(S.clip.end + delta, S.clip.start + minClip()));
    S.clip.end = t;
  }
  S.clip.cursor = t;
  if(t < S.clip.viewStart || t > S.clip.viewEnd){
    if(recenterView()){
      drawDetailPlaceholderNow();
      scheduleDetailRender();
    }
  }
  updateClipTimeline();
  requestPreviewFrame(t);
}

const frameStep = () => 1 / videoFps();
$('nStartM1s').onclick = () => nudgeClipEdge('start', -1);
$('nStartM1f').onclick = () => nudgeClipEdge('start', -frameStep());
$('nStartP1f').onclick = () => nudgeClipEdge('start', frameStep());
$('nStartP1s').onclick = () => nudgeClipEdge('start', 1);
$('nEndM1s').onclick = () => nudgeClipEdge('end', -1);
$('nEndM1f').onclick = () => nudgeClipEdge('end', -frameStep());
$('nEndP1f').onclick = () => nudgeClipEdge('end', frameStep());
$('nEndP1s').onclick = () => nudgeClipEdge('end', 1);

const HANDLE_HIT_RADIUS = 26; // px around a handle that grabs it instead of the cursor

$('clipEditor').addEventListener('pointerdown', e => {
  stopClipPlayback();
  const r = $('clipEditor').getBoundingClientRect();
  const x = e.clientX - r.left;
  const handleX = t => timeToDetailPct(t) / 100 * r.width;
  const startDist = Math.abs(x - handleX(S.clip.start));
  const endDist = Math.abs(x - handleX(S.clip.end));
  S.clip.dragging = startDist <= HANDLE_HIT_RADIUS && startDist <= endDist ? 'start'
    : endDist <= HANDLE_HIT_RADIUS ? 'end'
    : 'cursor';
  $('clipEditor').setPointerCapture(e.pointerId);
  moveClipPointer(e);
});

$('clipEditor').addEventListener('pointermove', e => {
  if(S.clip.dragging) moveClipPointer(e);
});

function moveClipPointer(e){
  const r = $('clipEditor').getBoundingClientRect();
  const time = detailPctToTime((e.clientX - r.left) / r.width);
  if(S.clip.dragging === 'start' || S.clip.dragging === 'end'){
    // Trimming a handle previews the frame at the handle so you can see what
    // you're cutting to, but the playhead stays put — it only moves when the
    // timeline itself is scrubbed. On release, endClipDrag snaps the preview
    // back to the playhead's frame.
    let edge;
    if(S.clip.dragging === 'start'){
      edge = S.clip.start = Math.max(0, Math.min(time, S.clip.end - minClip()));
    } else {
      edge = S.clip.end = Math.min(clipDuration(), Math.max(time, S.clip.start + minClip()));
    }
    updateClipTimeline();
    requestPreviewFrame(edge);
  } else {
    S.clip.cursor = Math.min(Math.max(time, 0), clipDuration());
    updateClipTimeline();
    requestPreviewFrame(S.clip.cursor);
  }
}

// After a handle is released near a view edge, or once the selection has
// drifted out of the band around recenterView's 3x target (in either
// direction), refit the window and re-render thumbnails. Widening pushes the
// handles at the view edges, so nearEdge covers it; shrinking moves them away
// from the edges, so it needs the SEL_FRAC_MIN check to zoom back in.
const SEL_FRAC_MIN = 0.22;        // shrink past this and the window tightens
const SEL_FRAC_MAX = 0.9;         // grow past this and the window coarsens
function maybeRecenterAfterEdit(){
  const span = viewSpan();
  const startFrac = (S.clip.start - S.clip.viewStart) / span;
  const endFrac = (S.clip.end - S.clip.viewStart) / span;
  const selFrac = (S.clip.end - S.clip.start) / span;
  const nearEdge = startFrac < EDGE_RECENTER_FRAC || endFrac > 1 - EDGE_RECENTER_FRAC;
  if(nearEdge || selFrac > SEL_FRAC_MAX || selFrac < SEL_FRAC_MIN){
    if(recenterView()){
      drawDetailPlaceholderNow();
      scheduleDetailRender();
    }
    updateClipTimeline();
  }
}

function endClipDrag(e){
  const wasHandle = S.clip.dragging === 'start' || S.clip.dragging === 'end';
  S.clip.dragging = null;
  try{ $('clipEditor').releasePointerCapture(e.pointerId); }catch(_){ }
  if(wasHandle){
    setClipCursor(S.clip.cursor);
    maybeRecenterAfterEdit();
  }
}
$('clipEditor').addEventListener('pointerup', endClipDrag);
$('clipEditor').addEventListener('pointercancel', endClipDrag);

// The coarse strip positions the clip itself (Apple-trimmer style): the
// selection keeps its length and slides to where you point, and the detail
// window pans in lockstep so the handles stay put on screen while the
// footage slides underneath them.
function moveOverviewPointer(e){
  const r = $('clipOverview').getBoundingClientRect();
  const t = overviewPctToTime((e.clientX - r.left) / r.width);
  const dur = clipDuration();
  const selLen = Math.min(dur, Math.max(minClip(), S.clip.end - S.clip.start));
  const newStart = Math.max(0, Math.min(t - selLen / 2, dur - selLen));
  const shift = newStart - S.clip.start;
  const cursorRel = Math.min(Math.max(S.clip.cursor - S.clip.start, 0), selLen);
  S.clip.start = newStart;
  S.clip.end = newStart + selLen;
  S.clip.cursor = newStart + cursorRel;

  const span = viewSpan();
  const vs = Math.max(0, Math.min(S.clip.viewStart + shift, dur - span));
  S.clip.viewStart = vs;
  S.clip.viewEnd = vs + span;

  drawDetailPlaceholderNow();
  updateClipTimeline();
  requestPreviewFrame(S.clip.cursor);
}

$('clipOverview').addEventListener('pointerdown', e => {
  stopClipPlayback();
  S.clip.overviewDragging = true;
  $('clipOverview').setPointerCapture(e.pointerId);
  moveOverviewPointer(e);
});
$('clipOverview').addEventListener('pointermove', e => {
  if(S.clip.overviewDragging) moveOverviewPointer(e);
});
function endOverviewDrag(e){
  if(!S.clip.overviewDragging) return;
  S.clip.overviewDragging = false;
  try{ $('clipOverview').releasePointerCapture(e.pointerId); }catch(_){ }
  scheduleDetailRender(150);
}
$('clipOverview').addEventListener('pointerup', endOverviewDrag);
$('clipOverview').addEventListener('pointercancel', endOverviewDrag);

let clipResizeTimer = null;
window.addEventListener('resize', () => {
  if(S.phase !== 'clip') return;
  clearTimeout(clipResizeTimer);
  clipResizeTimer = setTimeout(async () => {
    if(S.phase !== 'clip') return;
    S.clip.overviewThumbs = false;
    S.clip.detailKey = '';
    await renderOverviewStrip();
    updateClipTimeline();
    scheduleDetailRender(0);
  }, 300);
});

$('clipPlayBtn').onclick = () => {
  if(S.clip.playing) stopClipPlayback();
  else startClipPlayback().catch(() => {
    stopClipPlayback();
    $('trackStatus').textContent = 'Preview playback could not start. Tap Play again after the preview frame loads.';
    $('trackStatus').className = 'status warn';
  });
};

function setTrackProgress(label, pct, indeterminate=false){
  $('trackProgressBox').classList.remove('hidden');
  $('progressLabel').textContent = label;
  $('progressPct').textContent = indeterminate ? '' : `${Math.round(pct)}%`;
  $('trackProgress').classList.toggle('indeterminate', indeterminate);
  $('trackProgress').querySelector('span').style.width = indeterminate ? '' : `${Math.max(0, Math.min(100, pct))}%`;
}

function hideTrackProgress(){
  $('trackProgressBox').classList.add('hidden');
  $('trackProgress').classList.remove('indeterminate');
  $('trackProgress').querySelector('span').style.width = '0%';
  $('progressPct').textContent = '0%';
}

function postFormRequest(url, form, progressLabel){
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', url);
    xhr.responseType = 'json';

    if(progressLabel){
      xhr.upload.onprogress = e => {
        if(e.lengthComputable) setTrackProgress(progressLabel, e.loaded / e.total * 100);
        else setTrackProgress(progressLabel, 0, true);
      };
      setTrackProgress(progressLabel, 0);
    }

    xhr.onload = () => {
      const data = xhr.response || {};
      if(xhr.status >= 200 && xhr.status < 300 && data.ok) resolve(data);
      else if(xhr.status === 413) reject(new Error(data.error || 'File too large — the maximum is 2 GB.'));
      else reject(new Error(data.error || `Request failed with HTTP ${xhr.status}.`));
    };
    xhr.onerror = () => reject(new Error('Could not reach the local tracking server.'));
    xhr.send(form);
  });
}

function videoUploadKey(file){
  return `${file.name}:${file.size}:${file.lastModified}`;
}

function ensureVideoUploaded(progressLabel = 'Uploading video'){
  const key = videoUploadKey(S.videoFile);
  if(S.uploadedVideoId && S.uploadedVideoKey === key) return Promise.resolve(S.uploadedVideoId);
  if(S.uploadPromise && S.uploadPromiseKey === key) return S.uploadPromise;

  const form = new FormData();
  form.append('video_file', S.videoFile);
  S.uploadPromiseKey = key;
  S.uploadPromise = postFormRequest('/api/upload', form, progressLabel)
    .then(data => {
      S.uploadedVideoId = data.video_id;
      S.uploadedVideoKey = key;
      if(Number.isFinite(data.fps) && data.fps > 0){
        S.videoFps = data.fps;
        if(S.phase === 'clip') updateClipLabels();
      }
      return data.video_id;
    })
    .finally(() => {
      S.uploadPromise = null;
      S.uploadPromiseKey = null;
    });
  return S.uploadPromise;
}

async function waitForTracking(runId){
  while(true){
    const response = await fetch(`/api/track/status/${encodeURIComponent(runId)}`, {cache:'no-store'});
    const data = await response.json();
    if(!data.ok) throw new Error(data.error || 'Could not read tracking status.');

    const stageText = data.stage === 'refine' ? 'Refining hit windows'
      : data.stage === 'judging' ? 'Judging hits'
      : 'Analyzing';
    const label = data.status === 'queued' ? 'Queued'
      : data.status === 'running' ? `${stageText} — frame ${data.processed_frames}/${data.total_frames}`
      : data.status === 'complete' ? 'Processing complete'
      : 'Tracking failed';
    setTrackProgress(label, data.progress || 0);
    $('trackStatus').textContent = data.message || label;

    if(data.status === 'complete') return data;
    if(data.status === 'failed') throw new Error(data.error || 'Tracking failed.');
    await new Promise(resolve => setTimeout(resolve, 500));
  }
}

$('runTrackBtn').onclick = async () => {
  if(!S.videoFile){
    $('trackStatus').textContent = 'Load the source video again before tracking.';
    $('trackStatus').className = 'status warn';
    return;
  }

  const start = S.clip.start;
  const end = S.clip.end;
  if(end - start < minClip() - 1e-6){
    $('trackStatus').textContent = `Clip must be at least ${minClip().toFixed(1)}s long.`;
    $('trackStatus').className = 'status warn';
    return;
  }

  $('runTrackBtn').disabled = true;
  $('trackStatus').textContent = 'Preparing clip request…';
  $('trackStatus').className = 'status';

  try{
    const videoId = await ensureVideoUploaded();

    const form = new FormData();
    form.append('video_id', videoId);
    form.append('calibration_json', JSON.stringify(buildJson()));
    form.append('start_time', start.toString());
    form.append('end_time', end.toString());
    form.append('frame_stride', S.clip.frameStride.toString());
    form.append('inference_width', S.clip.inferenceWidth.toString());

    const started = await postFormRequest('/api/track', form);
    setTrackProgress('Analyzing frame 0/' + started.total_frames, 0);
    $('trackStatus').textContent = 'Running local model on the selected clip…';
    const data = await waitForTracking(started.run_id);
    S.run = data;
    $('trackStatus').textContent = `Tracked ${data.rows} frame rows.`;
    $('trackStatus').className = 'status ok';
    setPhase('track');
  } catch(error){
    showError(error.message);
    $('trackStatus').textContent = '';
    $('trackStatus').className = 'status';
  } finally {
    $('runTrackBtn').disabled = false;
    setTimeout(hideTrackProgress, 700);
  }
};

function buildTrackView(){
  if(!S.run) return;
  const hits = S.run.hits || [];
  const initialFrame = hits.length ? hits[0].frame : S.run.start_frame;
  $('judgeFrame').min = S.run.start_frame;
  $('judgeFrame').max = S.run.end_frame;
  $('judgeFrame').value = initialFrame;
  $('judgeFrameOut').textContent = `${S.run.start_frame}–${S.run.end_frame}`;
  clearJudgeResult();
  buildHitTimeline(hits, initialFrame);
}

function frameToRunPct(frame){
  const span = Math.max(1, S.run.end_frame - S.run.start_frame);
  return Math.min(100, Math.max(0, (frame - S.run.start_frame) / span * 100));
}

function updateTrackCursor(frame){
  if(!S.run) return;
  $('trackCursor').style.left = `${frameToRunPct(frame)}%`;
}

function buildHitTimeline(hits, initialFrame){
  $('hitTimeline').classList.remove('hidden');
  const bars = $('hitBars');
  bars.innerHTML = '';

  for(const hit of hits){
    const type = hit.event_type;
    const nonWall = EVENT_LABELS[type] !== undefined;
    const cls = nonWall ? (type === 'side_wall' ? 'side' : type)
      : hit.call === 'IN' ? 'in' : hit.call === 'OUT' ? 'out' : 'unknown';
    const bar = document.createElement('div');
    bar.className = `hitBar ${cls}`;
    bar.style.left = `${frameToRunPct(hit.frame)}%`;
    const label = nonWall
      ? EVENT_LABELS[type].toLowerCase()
      : `${callWithMargin(hit.call, hit.margin_px)}${type === 'wall' ? ' · wall' : ''}`;
    const audioDb = hit.signals && hit.signals.audio_score;
    const audio = audioDb == null ? '' : ` (audio +${audioDb.toFixed(1)} dB)`;
    bar.title = `Frame ${hit.frame} · ${label}${audio}`;
    bar.addEventListener('pointerdown', e => e.stopPropagation());
    bar.addEventListener('click', () => {
      seekSourceFrameToCanvas(hit.frame);
      // Verdicts apply to front-wall hits only; other events show their
      // classification without requesting a line call.
      if(nonWall) renderEventCard(hit);
      else judgeFrameRequest(hit.frame);
    });
    bars.appendChild(bar);
  }

  if(S.run.hits_error){
    $('hitsStatus').textContent = `Wall-hit detection failed: ${S.run.hits_error}`;
    $('hitsStatus').className = 'status warn';
  } else if(hits.length){
    $('hitsStatus').textContent = 'Tap a bar to jump to the bounce frame, or drag anywhere on the strip to scrub.';
    $('hitsStatus').className = 'status';
  } else {
    $('hitsStatus').textContent = 'No wall hits detected in this clip. Drag on the strip to scrub frames manually.';
    $('hitsStatus').className = 'status warn';
  }

  updateTrackCursor(initialFrame);
  renderTrackStrip(initialFrame);
}

async function renderTrackStrip(initialFrame){
  const gen = ++S.trackStripGen;
  const strip = $('trackStrip');
  const box = $('hitTimeline').getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  strip.width = Math.max(1, Math.round(box.width * dpr));
  strip.height = Math.max(1, Math.round(box.height * dpr));
  const cc = strip.getContext('2d');
  cc.setTransform(dpr, 0, 0, dpr, 0, 0);
  cc.fillStyle = stripBg();
  cc.fillRect(0, 0, box.width, box.height);

  const fps = S.run && S.run.fps ? S.run.fps : 60;
  const startT = S.run.start_frame / fps;
  const endT = S.run.end_frame / fps;
  const count = Math.max(5, Math.min(12, Math.floor(box.width / 86)));
  const thumbW = box.width / count;
  vid.pause();

  for(let i = 0; i < count; i++){
    const t = startT + (i + 0.5) / count * (endT - startT);
    await seekVideo(t);
    if(gen !== S.trackStripGen || S.phase !== 'track') return;
    cc.drawImage(vid, i * thumbW, 0, thumbW, box.height);
    cc.strokeStyle = 'rgba(255,255,255,.12)';
    cc.strokeRect(i * thumbW, 0, thumbW, box.height);
  }

  seekSourceFrameToCanvas(initialFrame);
}

let trackScrubbing = false;
function scrubTrackPointer(e){
  if(!S.run) return;
  const r = $('hitTimeline').getBoundingClientRect();
  const pct = Math.min(1, Math.max(0, (e.clientX - r.left) / r.width));
  const frame = Math.round(S.run.start_frame + pct * (S.run.end_frame - S.run.start_frame));
  seekSourceFrameToCanvas(frame);
}
$('hitTimeline').addEventListener('pointerdown', e => {
  if(S.phase !== 'track') return;
  $('hitTimeline').setPointerCapture(e.pointerId);
  trackScrubbing = true;
  scrubTrackPointer(e);
});
$('hitTimeline').addEventListener('pointermove', e => {
  if(trackScrubbing) scrubTrackPointer(e);
});
$('hitTimeline').addEventListener('pointerup', e => {
  trackScrubbing = false;
  $('hitTimeline').releasePointerCapture(e.pointerId);
});
$('hitTimeline').addEventListener('pointercancel', () => { trackScrubbing = false; });

function clampTrackedFrame(frame){
  if(!S.run) return;
  return Math.min(S.run.end_frame, Math.max(S.run.start_frame, frame));
}

function isTrackedFrame(frame){
  return S.run && frame >= S.run.start_frame && frame <= S.run.end_frame;
}

async function seekSourceFrameToCanvas(frame, syncInput=true){
  if(!S.run || !Number.isFinite(S.run.fps) || S.run.fps <= 0) return;
  frame = clampTrackedFrame(frame);
  const seekId = ++S.trackSeekId;
  const t = frame / S.run.fps;
  vid.pause();
  await seekVideo(t);
  if(seekId !== S.trackSeekId) return;
  canvas.width = S.W;
  canvas.height = S.H;
  ctx.drawImage(vid, 0, 0, S.W, S.H);
  for(const k of ORDER){
    const L = S.lines[k];
    if(L) drawFitLine(L.fit, CFG[k].hex);
  }
  updateTrackCursor(frame);
  if(syncInput) $('judgeFrame').value = frame;
}

$('judgeFrame').addEventListener('change', () => {
  const frame = parseInt($('judgeFrame').value, 10);
  if(!Number.isNaN(frame)) seekSourceFrameToCanvas(frame);
});
$('judgeFrame').addEventListener('input', () => {
  const frame = parseInt($('judgeFrame').value, 10);
  if(!Number.isNaN(frame) && isTrackedFrame(frame)) seekSourceFrameToCanvas(frame, false);
});

function callWithMargin(call, marginPx){
  if(marginPx == null) return call;
  const px = Math.abs(marginPx).toFixed(0);
  if(call === 'IN') return `IN by ${px}px`;
  if(call === 'OUT') return `OUT by ${px}px`;
  return call;
}

const EVENT_LABELS = { racket:'Racket hit', floor:'Floor bounce', side_wall:'Side wall' };

function clearJudgeResult(){
  $('judgeResult').className = 'verdict blank';
  $('judgeResult').innerHTML = '<div>No line call yet</div>';
}

function renderEventCard(hit){
  $('judgeResult').className = 'verdict neutral';
  $('judgeResult').innerHTML =
    `<strong>${EVENT_LABELS[hit.event_type] || hit.event_type}</strong>` +
    `<div>Frame ${hit.frame} · line calls apply to front-wall hits only</div>`;
}

function renderJudgeResult(data){
  const callClass = data.call === 'IN' ? 'in' : data.call === 'OUT' ? 'out' : 'neutral';
  const sourceText = data.source === 'impact_estimate' ? 'estimated impact point' : 'detected ball center';
  $('judgeResult').className = `verdict ${callClass}`;
  $('judgeResult').innerHTML =
    `<strong>${callWithMargin(data.call, data.margin_px)}</strong>` +
    `<div>Frame ${data.frame} · ${sourceText} (${data.ball.x.toFixed(1)}, ${data.ball.y.toFixed(1)}) · ` +
    `${data.reason}${data.outside_line_span ? ' · outside calibrated line span' : ''}</div>`;
}

async function judgeFrameRequest(frame){
  if(!S.run || Number.isNaN(frame)) return;
  $('judgeBtn').disabled = true;
  clearJudgeResult();

  try{
    const response = await fetch('/api/judge', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ run_id:S.run.run_id, frame })
    });
    const data = await response.json();
    if(!data.ok) throw new Error(data.error || 'Judgement failed.');
    renderJudgeResult(data);
  } catch(error){
    showError(error.message);
  } finally {
    $('judgeBtn').disabled = false;
  }
}

$('judgeBtn').onclick = () => {
  if(!S.run) return;
  const frame = parseInt($('judgeFrame').value, 10);
  if(Number.isNaN(frame)) return;
  seekSourceFrameToCanvas(frame);
  judgeFrameRequest(frame);
};

setPhase('load');
checkBackend();
</script>
</body>
</html>
